{% extends "base.html" %}

<style>
.site-header {
    display: none;
}
</style>

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h2>Вход</h2>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Логин</label>
                {{ form.username }}
            </div>

            <div class="form-group">
                <label>Пароль</label>
                {{ form.password }}
            </div>

            <button type="submit" class="auth-btn">
                Войти
            </button>

        </form>

    </div>

</div>

{% endblock %}
